<!DOCTYPE html>
<html>
<head>
  <title>Rastreamento de Entregas</title>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    #map { height: 500px; }
  </style>
</head>
<body>
  <h2>Vagas Express - Rastreamento de Entregas</h2>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Inicializa mapa no Rio de Janeiro
    var map = L.map('map').setView([-22.9068, -43.1729], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: 'Map data © OpenStreetMap'
    }).addTo(map);

    // Veículos simulados
    var vehicles = [
      { id: 1, name: "Caminhão 1", lat: -22.90, lng: -43.17 },
      { id: 2, name: "Moto 2", lat: -22.92, lng: -43.20 }
    ];

    // Marcadores
    var markers = {};
    vehicles.forEach(v => {
      markers[v.id] = L.marker([v.lat, v.lng]).addTo(map).bindPopup(v.name);
    });

    // Simulação de movimento (rede enviando dados)
    setInterval(() => {
      vehicles.forEach(v => {
        v.lat += (Math.random() - 0.5) * 0.01;
        v.lng += (Math.random() - 0.5) * 0.01;
        markers[v.id].setLatLng([v.lat, v.lng]);
      });
    }, 2000);
  </script>
</body>
</html>
